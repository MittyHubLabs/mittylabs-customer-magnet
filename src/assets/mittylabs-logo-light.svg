<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 175" fill="none">
  <defs>
    <radialGradient id="beaconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b2efda" stop-opacity="1"/>
      <stop offset="60%" stop-color="#b2efda" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#b2efda" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lightCone" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#b2efda" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#b2efda" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Light rays upward -->
  <polygon points="100,34 97,6 103,6"  fill="#b2efda" opacity="0.4"/>
  <polygon points="100,34 82,10 88,4"  fill="#b2efda" opacity="0.22"/>
  <polygon points="100,34 118,10 112,4" fill="#b2efda" opacity="0.22"/>
  <polygon points="100,34 64,16 69,8"  fill="#b2efda" opacity="0.14"/>
  <polygon points="100,34 136,16 131,8" fill="#b2efda" opacity="0.14"/>

  <!-- Downward light cone -->
  <polygon points="100,38 55,152 145,152" fill="url(#lightCone)"/>

  <!-- LEFT MOUNTAIN — left face -->
  <polygon points="60,72 10,152 60,152" fill="#0c503d"/>
  <!-- LEFT MOUNTAIN — right face (lighter) -->
  <polygon points="60,72 60,152 102,152" fill="#0c5a42"/>
  <!-- LEFT MOUNTAIN — peak cap -->
  <polygon points="60,72 50,93 70,93"  fill="#8bd0b9" opacity="0.85"/>

  <!-- RIGHT MOUNTAIN — left face (lighter) -->
  <polygon points="140,72 98,152 140,152" fill="#0c5a42"/>
  <!-- RIGHT MOUNTAIN — right face (darker) -->
  <polygon points="140,72 140,152 190,152" fill="#053929"/>
  <!-- RIGHT MOUNTAIN — peak cap -->
  <polygon points="140,72 130,93 150,93" fill="#8bd0b9" opacity="0.85"/>

  <!-- CENTER MOUNTAIN — left face (lighter) -->
  <polygon points="100,36 30,152 100,152" fill="#116d50"/>
  <!-- CENTER MOUNTAIN — right face (darker) -->
  <polygon points="100,36 100,152 170,152" fill="#063d2b"/>
  <!-- CENTER MOUNTAIN — upper highlight -->
  <polygon points="100,36 83,72 117,72"  fill="#8bd0b9" opacity="0.75"/>
  <!-- CENTER MOUNTAIN — bright peak tip -->
  <polygon points="100,36 93,52 107,52"  fill="#b2efda"/>

  <!-- Beacon glow -->
  <circle cx="100" cy="34" r="14" fill="url(#beaconGlow)"/>
  <!-- Beacon ring -->
  <circle cx="100" cy="34" r="5"  fill="#116d50" stroke="#b2efda" stroke-width="1.5"/>
  <!-- Beacon dot -->
  <circle cx="100" cy="34" r="2"  fill="white"/>
</svg>
